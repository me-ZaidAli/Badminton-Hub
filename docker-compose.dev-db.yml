services:
  db:
    image: postgres:16
    container_name: badminton-hub-db
    environment:
      POSTGRES_USER: clubmaster
      POSTGRES_PASSWORD: clubmaster
      POSTGRES_DB: clubmaster
    ports:
      - "5433:5432"
    volumes:
      - badminton_hub_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clubmaster -d clubmaster"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  badminton_hub_pgdata:
